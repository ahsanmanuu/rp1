services:
  - type: web
    name: latexify
    runtime: node
    plan: starter # Free (512MB) is insufficient — Next.js + PocketBase together need ~1GB
    buildCommand: npm install && npm run build && npx prisma db push --accept-data-loss && (curl -L -o pocketbase.zip https://github.com/pocketbase/pocketbase/releases/download/v0.27.0/pocketbase_0.27.0_linux_amd64.zip && unzip -o pocketbase.zip && chmod +x pocketbase && rm pocketbase.zip)
    startCommand: node start.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.0
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://rp1-gg10.onrender.com
      - key: PB_DATA_DIR
        value: /opt/render/project/src/pb_data
      - key: POCKETBASE_URL
        value: http://127.0.0.1:8090
      - key: POCKETBASE_ADMIN_EMAIL
        value: admin@latexify.io
      - key: POCKETBASE_ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://rp1-gg10.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_CHAT_API_KEY
        sync: false
      - key: OPENCODE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: sid.ilm6@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        value: sid.ilm6@gmail.com
      - key: RESEND_API_KEY
        sync: false
      - key: CASHFREE_APP_ID
        sync: false
      - key: CASHFREE_SECRET_KEY
        sync: false
      - key: CASHFREE_ENV
        value: test
    disk:
      name: pb-data
      mountPath: /opt/render/project/src/pb_data
      sizeGB: 1
