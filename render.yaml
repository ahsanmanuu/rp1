services:
  - type: web
    name: latexify
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build && (curl -L -o pocketbase.zip https://github.com/pocketbase/pocketbase/releases/download/v0.27.0/pocketbase_0.27.0_linux_amd64.zip && unzip -o pocketbase.zip && chmod +x pocketbase && rm pocketbase.zip)
    startCommand: node start.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.0
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://rp-18pf.onrender.com
      - key: POCKETBASE_URL
        value: http://127.0.0.1:8090
      - key: POCKETBASE_ADMIN_EMAIL
        value: admin@latexify.io
      - key: POCKETBASE_ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://rp-18pf.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_CHAT_API_KEY
        sync: false
      - key: OPENCODE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: sid.ilm6@gmail.com
      - key: SMTP_PASS
        value: ttocswdpvlllimkf
      - key: ADMIN_EMAIL
        value: sid.ilm6@gmail.com
      - key: RESEND_API_KEY
        value: re_KZx3N3f5_CcZXYH7dJhY3usgBYSCA4jPM
    disk:
      name: pb-data
      mountPath: /opt/render/project/src/pb_data
      sizeGB: 1

